<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA Admin - Manage Quizzes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
        .admin-container { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 280px; background: linear-gradient(180deg, #0f3460 0%, #16213e 100%); padding: 2rem 1rem; border-radius: 0 30px 30px 0; box-shadow: 10px 0 20px rgba(0,0,0,0.2); }
        .admin-logo { text-align: center; margin-bottom: 2rem; }
        .admin-logo .logo-icon { font-size: 3rem; animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .admin-logo h2 { color: #ffd700; font-size: 1.5rem; }
        .admin-nav .nav-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; margin: 0.5rem 0; background: rgba(255,255,255,0.05); border-radius: 50px; color: #ccddee; text-decoration: none; font-weight: bold; transition: all 0.3s; }
        .admin-nav .nav-item:hover, .admin-nav .nav-item.active { background: #ffd700; color: #0f3460; }
        .logout-btn { background: #ff4757; color: white; border: none; padding: 0.8rem; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 2rem; width: 100%; font-family: inherit; }
        .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .admin-header h1 { color: #ffd700; }
        .create-quiz-btn { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #0f3460; border: none; padding: 0.8rem 1.5rem; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; font-family: inherit; transition: all 0.3s; }
        .create-quiz-btn:hover { transform: scale(1.05); }
        .quizzes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .quiz-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 25px; padding: 1.5rem; transition: all 0.3s; border: 1px solid rgba(255,215,0,0.2); }
        .quiz-card:hover { transform: translateY(-5px); border-color: #ffd700; }
        .quiz-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .quiz-title { color: #ffd700; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .quiz-meta { display: flex; gap: 0.8rem; margin: 1rem 0; flex-wrap: wrap; }
        .meta-tag { background: rgba(255,215,0,0.2); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem; color: #ffd700; }
        .quiz-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer; font-family: inherit; }
        .toggle-btn { color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer; font-family: inherit; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #16213e; border-radius: 30px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 2rem; animation: modalPop 0.3s ease-out; border: 2px solid #ffd700; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-header h2 { color: #ffd700; }
        .close-modal { font-size: 2rem; cursor: pointer; color: #ffd700; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #ccddee; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid rgba(255,215,0,0.3); border-radius: 15px; background: rgba(255,255,255,0.05); color: white; font-family: inherit; outline: none; }
        .question-item { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 1rem; margin-bottom: 1rem; }
        .question-header { display: flex; justify-content: space-between; margin-bottom: 1rem; color: #ffd700; font-weight: bold; }
        .remove-question { background: #ff4757; color: white; border: none; padding: 0.3rem 0.8rem; border-radius: 50px; cursor: pointer; }
        .add-question-btn { background: #4caf50; color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; cursor: pointer; margin-bottom: 1rem; font-family: inherit; }
        .submit-btn { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #0f3460; border: none; padding: 1rem; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; font-family: inherit; margin-top: 1rem; }
        .empty-state { text-align: center; padding: 3rem; color: #8899aa; }
        .toast { position: fixed; bottom: 2rem; right: 2rem; background: #4caf50; color: white; padding: 1rem 1.5rem; border-radius: 15px; display: none; z-index: 9999; font-family: inherit; }
        @media (max-width: 768px) { .admin-container { flex-direction: column; } .admin-sidebar { width: 100%; border-radius: 0 0 30px 30px; } .quizzes-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <div class="admin-logo"><div class="logo-icon">🤖📚</div><h2>AISHA Admin</h2></div>
            <nav class="admin-nav">
                <a href="/admin/dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="/admin/books.html" class="nav-item">📖 Manage Books</a>
                <a href="/admin/quizzes.html" class="nav-item active">📝 Manage Quizzes</a>
                <a href="/admin/users.html" class="nav-item">👥 Manage Students</a>
                <a href="/admin/analytics.html" class="nav-item">📈 Analytics</a>
            </nav>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>📝 AISHA's Quiz Collection</h1>
                <button class="create-quiz-btn" onclick="showCreateQuizModal()">✨ Create New Quiz</button>
            </div>
            <div id="quizzesGrid" class="quizzes-grid">
                <div class="empty-state">📝 Loading quizzes...</div>
            </div>
        </main>
    </div>

    <div id="createQuizModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✨ Create New Quiz</h2>
                <span class="close-modal" onclick="closeCreateQuizModal()">&times;</span>
            </div>
            <form id="createQuizForm" onsubmit="createQuiz(event)">
                <div class="form-group"><label>📝 Quiz Title</label><input type="text" id="quizTitle" placeholder="e.g., Algebra Basics" required></div>
                <div class="form-group">
                    <label>📚 Subject / Category</label>
                    <input type="text" id="quizSubject" placeholder="e.g., Islamic Studies, French, Coding..." required>
                </div>
                <div class="form-group">
                    <label>⭐ Difficulty</label>
                    <select id="quizDifficulty">
                        <option value="1">🍭 Easy Peasy</option>
                        <option value="2">📚 Medium</option>
                        <option value="3">🔥 Challenge Mode</option>
                    </select>
                </div>
                <div class="form-group"><label>⏱️ Time Limit (minutes)</label><input type="number" id="quizTimeLimit" value="15" min="5" max="60"></div>
                <h3 style="color:#ffd700; margin-bottom:1rem;">📋 Questions</h3>
                <div id="questionsContainer"></div>
                <button type="button" class="add-question-btn" onclick="addQuestion()">➕ Add Question</button>
                <button type="submit" class="submit-btn" id="createQuizBtn">🚀 Create Quiz</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let questionCount = 0;
        function getCurrentUser() { return JSON.parse(localStorage.getItem('user') || 'null'); }
        function logout() { localStorage.removeItem('user'); window.location.href = '/login.html'; }
        const user = getCurrentUser();
        if (!user || user.role !== 'admin') window.location.href = '/login.html';

        function showToast(msg, color = '#4caf50') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = color;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function getQuizIcon(subject) {
            return { Mathematics: '📐', Physics: '⚛️', Chemistry: '🧪', Biology: '🧬', History: '🌍', Literature: '📖' }[subject] || '📝';
        }

        function getDifficultyIcon(level) {
            return level == 1 ? '🍭 Easy' : level == 2 ? '📚 Medium' : '🔥 Hard';
        }

        async function loadQuizzes() {
            try {
                const res = await fetch('/api/quizzes');
                const data = await res.json();
                if (data.success) displayQuizzes(data.quizzes);
                else document.getElementById('quizzesGrid').innerHTML = '<div class="empty-state">📝 No quizzes yet.</div>';
            } catch {
                document.getElementById('quizzesGrid').innerHTML = '<div class="empty-state">⚠️ Could not load quizzes.</div>';
            }
        }

        function displayQuizzes(quizzes) {
            const grid = document.getElementById('quizzesGrid');
            if (!quizzes.length) { grid.innerHTML = '<div class="empty-state">📝 No quizzes yet. Click "Create New Quiz" to get started!</div>'; return; }
            grid.innerHTML = quizzes.map(quiz => {
                const questions = typeof quiz.questions === 'string' ? JSON.parse(quiz.questions) : (quiz.questions || []);
                return `
                <div class="quiz-card">
                    <div class="quiz-icon">${getQuizIcon(quiz.subject)}</div>
                    <div class="quiz-title">${quiz.title}</div>
                    <div class="quiz-meta">
                        <span class="meta-tag">📚 ${quiz.subject}</span>
                        <span class="meta-tag">${getDifficultyIcon(quiz.difficulty)}</span>
                        <span class="meta-tag">⏱️ ${quiz.time_limit} min</span>
                        <span class="meta-tag">📝 ${questions.length} questions</span>
                    </div>
                    <div class="quiz-actions">
                        <button class="toggle-btn" style="background:${quiz.is_active ? '#4caf50' : '#999'}" onclick="toggleQuiz(${quiz.id}, ${!quiz.is_active})">${quiz.is_active ? '✅ Active' : '❌ Inactive'}</button>
                        <button class="delete-btn" onclick="deleteQuiz(${quiz.id})">🗑️ Delete</button>
                    </div>
                </div>
            `}).join('');
        }

        function addQuestion() {
            const container = document.getElementById('questionsContainer');
            const div = document.createElement('div');
            div.className = 'question-item';
            div.id = `question_${questionCount}`;
            div.innerHTML = `
                <div class="question-header">
                    <span>Question ${questionCount + 1}</span>
                    <button type="button" class="remove-question" onclick="this.closest('.question-item').remove()">Remove</button>
                </div>
                <div class="form-group"><label>Question Text</label><input type="text" class="question-text" placeholder="e.g., What is 2 + 2?" required></div>
                <div class="form-group">
                    <label>Options</label>
                    <input type="text" class="option" placeholder="Option A" style="margin-bottom:5px;">
                    <input type="text" class="option" placeholder="Option B" style="margin-bottom:5px;">
                    <input type="text" class="option" placeholder="Option C" style="margin-bottom:5px;">
                    <input type="text" class="option" placeholder="Option D" style="margin-bottom:5px;">
                </div>
                <div class="form-group"><label>Correct Answer (must match one option exactly)</label><input type="text" class="correct-answer" placeholder="e.g., 4" required></div>
            `;
            container.appendChild(div);
            questionCount++;
        }

        async function createQuiz(e) {
            e.preventDefault();
            const btn = document.getElementById('createQuizBtn');
            btn.disabled = true;
            btn.textContent = 'Creating...';

            const questions = [];
            document.querySelectorAll('.question-item').forEach(item => {
                const text = item.querySelector('.question-text').value;
                const options = Array.from(item.querySelectorAll('.option')).map(o => o.value).filter(Boolean);
                const correct = item.querySelector('.correct-answer').value;
                if (text && options.length >= 2 && correct) questions.push({ text, options, correct });
            });

            if (!questions.length) { showToast('⚠️ Add at least one question!', '#ff9800'); btn.disabled = false; btn.textContent = '🚀 Create Quiz'; return; }

            try {
                const res = await fetch('/api/quizzes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: document.getElementById('quizTitle').value,
                        subject: document.getElementById('quizSubject').value,
                        difficulty: parseInt(document.getElementById('quizDifficulty').value),
                        time_limit: parseInt(document.getElementById('quizTimeLimit').value),
                        questions
                    })
                });
                const data = await res.json();
                if (data.success) {
                    closeCreateQuizModal();
                    showToast('✨ Quiz created!');
                    loadQuizzes();
                } else {
                    showToast('❌ ' + (data.error || 'Failed'), '#ff4757');
                }
            } catch {
                showToast('❌ Connection error', '#ff4757');
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Create Quiz';
            }
        }

        async function toggleQuiz(id, isActive) {
            try {
                await fetch(`/api/quizzes/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ is_active: isActive }) });
                loadQuizzes();
            } catch { showToast('❌ Failed to update', '#ff4757'); }
        }

        async function deleteQuiz(id) {
            if (!confirm('Delete this quiz?')) return;
            try {
                const res = await fetch(`/api/quizzes/${id}`, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) { showToast('Quiz deleted'); loadQuizzes(); }
                else showToast('❌ Failed', '#ff4757');
            } catch { showToast('❌ Connection error', '#ff4757'); }
        }

        function showCreateQuizModal() { document.getElementById('createQuizModal').style.display = 'flex'; addQuestion(); }
        function closeCreateQuizModal() {
            document.getElementById('createQuizModal').style.display = 'none';
            document.getElementById('createQuizForm').reset();
            document.getElementById('questionsContainer').innerHTML = '';
            questionCount = 0;
        }
        window.onclick = e => { if (e.target === document.getElementById('createQuizModal')) closeCreateQuizModal(); };
        loadQuizzes();
    </script>
</body>
</html>
