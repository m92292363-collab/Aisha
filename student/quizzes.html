<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA's Quiz Zone - Fun Learning!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffe0f5 100%);
            min-height: 100vh;
        }
        
        /* Cartoon Container */
        .quiz-cartoon-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .cartoon-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #ff6b9d 0%, #ff85b3 100%);
            padding: 2rem 1rem;
            border-radius: 0 30px 30px 0;
            box-shadow: 10px 0 20px rgba(0,0,0,0.1);
        }
        
        .aisha-avatar {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .avatar-icon {
            font-size: 5rem;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .aisha-avatar h2 {
            color: white;
            font-size: 2rem;
            text-shadow: 3px 3px 0 #ff4081;
        }
        
        .nav-cartoon-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            margin: 0.5rem 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .nav-cartoon-item:hover, .nav-cartoon-item.active {
            background: #ffd700;
            color: #ff6b9d;
            transform: scale(1.05);
        }
        
        .logout-cartoon {
            background: #ff4757;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 2rem;
            width: 100%;
            font-family: inherit;
        }
        
        /* Main Content */
        .quiz-main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        
        /* Header */
        .quiz-header {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 30px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .quiz-header h1 {
            color: #ff6b9d;
            font-size: 2rem;
        }
        
        .quiz-header p {
            color: #ff85b3;
        }
        
        .quiz-emoji {
            font-size: 3rem;
            animation: spin 4s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Filters */
        .quiz-filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: 2px solid #ffd700;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1rem;
            background: white;
        }
        
        .filter-select {
            padding: 0.8rem 1.2rem;
            border: 2px solid #ffd700;
            border-radius: 50px;
            font-family: inherit;
            background: white;
            cursor: pointer;
        }
        
        /* Quiz Cards Grid */
        .quizzes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        
        .quiz-card {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #ffe0e8;
            position: relative;
            overflow: hidden;
        }
        
        .quiz-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(255,107,157,0.2);
            border-color: #ffd700;
        }
        
        .quiz-card::before {
            content: "✨";
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 50px;
            opacity: 0.1;
        }
        
        .quiz-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .quiz-title {
            font-size: 1.3rem;
            color: #ff6b9d;
            margin-bottom: 0.5rem;
        }
        
        .quiz-subject {
            display: inline-block;
            background: #fff0f5;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        
        .quiz-stats {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: #999;
        }
        
        .difficulty {
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .difficulty-easy {
            background: #c8e6e0;
            color: #2d6a4f;
        }
        
        .difficulty-medium {
            background: #ffe0b5;
            color: #e67e22;
        }
        
        .difficulty-hard {
            background: #ffcccc;
            color: #c0392b;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #ff6b9d, #ff85b3);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .start-btn:hover {
            transform: scale(1.02);
        }
        
        /* Quiz Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 40px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalPop 0.3s ease-out;
        }
        
        @keyframes modalPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .modal-header {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            padding: 1.5rem;
            border-radius: 40px 40px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            color: #ff6b9d;
        }
        
        .close-modal {
            font-size: 2rem;
            cursor: pointer;
            color: #ff6b9d;
        }
        
        .quiz-timer {
            background: #ff6b9d;
            color: white;
            padding: 0.5rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .quiz-question {
            padding: 1.5rem;
            border-bottom: 1px solid #ffe0e8;
        }
        
        .question-text {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 1rem;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            background: #fff5f8;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quiz-option:hover {
            background: #ffe0e8;
            transform: translateX(5px);
        }
        
        .quiz-option input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .modal-footer {
            padding: 1.5rem;
            text-align: center;
        }
        
        .submit-quiz-btn {
            background: linear-gradient(135deg, #4caf50, #66bb6a);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        
        /* Result Modal */
        .result-modal .modal-content {
            text-align: center;
        }
        
        .result-score {
            font-size: 3rem;
            color: #ffd700;
            margin: 1rem 0;
        }
        
        .result-percentage {
            font-size: 2rem;
            font-weight: bold;
            color: #ff6b9d;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #ff85b3;
            font-size: 1.2rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .quiz-cartoon-container {
                flex-direction: column;
            }
            
            .cartoon-sidebar {
                width: 100%;
                border-radius: 0 0 30px 30px;
            }
            
            .quizzes-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-cartoon-container">
        <!-- Sidebar -->
        <aside class="cartoon-sidebar">
            <div class="aisha-avatar">
                <div class="avatar-icon">🤖💕</div>
                <h2>AISHA</h2>
                <p>Your AI Bestie & Tutor</p>
            </div>
            
            <nav>
                <a href="/student/dashboard.html" class="nav-cartoon-item">
                    <span>🏠</span> Home
                </a>
                <a href="/student/chat.html" class="nav-cartoon-item">
                    <span>💬</span> Chat with AISHA
                </a>
                <a href="/student/quizzes.html" class="nav-cartoon-item active">
                    <span>📝</span> Quizzes
                </a>
                <a href="/student/progress.html" class="nav-cartoon-item">
                    <span>📈</span> My Progress
                </a>
            </nav>
            
            <button class="logout-cartoon" onclick="logout()">
                🚪 Goodbye for now!
            </button>
        </aside>
        
        <!-- Main Content -->
        <main class="quiz-main">
            <div class="quiz-header">
                <div>
                    <h1>📝 Quiz Zone</h1>
                    <p>Test your knowledge with AISHA's fun quizzes!</p>
                </div>
                <div class="quiz-emoji">🎯✨</div>
            </div>
            
            <div class="quiz-filters">
                <input type="text" id="searchQuiz" class="search-box" placeholder="🔍 Search quizzes...">
                <select id="difficultyFilter" class="filter-select">
                    <option value="">⭐ All Difficulties</option>
                    <option value="easy">🍭 Easy Peasy</option>
                    <option value="medium">📚 Medium</option>
                    <option value="hard">🔥 Challenge Mode</option>
                </select>
            </div>
            
            <div id="quizzesGrid" class="quizzes-grid">
                <div class="loading">🎲 AISHA is preparing your quizzes...</div>
            </div>
        </main>
    </div>
    
    <!-- Quiz Modal -->
    <div id="quizModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalQuizTitle">Quiz Time!</h2>
                <span class="close-modal" onclick="closeQuizModal()">&times;</span>
            </div>
            <div id="quizTimer" class="quiz-timer">⏱️ Time: --:--</div>
            <div id="quizQuestionsContainer"></div>
            <div class="modal-footer">
                <button class="submit-quiz-btn" onclick="submitQuiz()">✨ Submit Quiz ✨</button>
            </div>
        </div>
    </div>
    
    <!-- Result Modal -->
    <div id="resultModal" class="modal result-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎉 Quiz Complete! 🎉</h2>
                <span class="close-modal" onclick="closeResultModal()">&times;</span>
            </div>
            <div style="padding: 2rem;">
                <div class="result-score" id="resultEmoji">🏆</div>
                <div class="result-percentage" id="resultPercentage">0%</div>
                <p id="resultMessage" style="margin: 1rem 0; color: #666;"></p>
                <button class="submit-quiz-btn" onclick="closeResultModal()">Continue Learning 📚</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentQuiz = null;
        let timerInterval = null;
        let timeLeft = 0;
        
        // Mock quizzes data
        const quizzes = [
            {
                id: 1,
                title: "🧮 Algebra Adventure",
                subject: "Mathematics",
                difficulty: "easy",
                icon: "🧮",
                timeLimit: 15,
                questions: 10,
                questions_data: [
                    { text: "What is x + 3 = 7?", options: ["x = 3", "x = 4", "x = 5", "x = 10"], correct: "x = 4" },
                    { text: "What is 2x = 10?", options: ["x = 2", "x = 5", "x = 8", "x = 12"], correct: "x = 5" },
                    { text: "If y = 2x + 1, what is y when x = 3?", options: ["5", "6", "7", "8"], correct: "7" }
                ]
            },
            {
                id: 2,
                title: "⚛️ Physics Fun",
                subject: "Physics",
                difficulty: "medium",
                icon: "⚛️",
                timeLimit: 20,
                questions: 8,
                questions_data: [
                    { text: "What is Newton's First Law also called?", options: ["Law of Inertia", "Law of Force", "Law of Action", "Law of Gravity"], correct: "Law of Inertia" },
                    { text: "What is the unit of force?", options: ["Joule", "Watt", "Newton", "Pascal"], correct: "Newton" },
                    { text: "What is acceleration due to gravity on Earth?", options: ["9.8 m/s²", "8.9 m/s²", "10.8 m/s²", "7.8 m/s²"], correct: "9.8 m/s²" }
                ]
            },
            {
                id: 3,
                title: "🧬 Biology Blast",
                subject: "Biology",
                difficulty: "easy",
                icon: "🧬",
                timeLimit: 15,
                questions: 10,
                questions_data: [
                    { text: "What is the powerhouse of the cell?", options: ["Nucleus", "Mitochondria", "Ribosome", "Chloroplast"], correct: "Mitochondria" },
                    { text: "What pigment makes plants green?", options: ["Carotene", "Melanin", "Chlorophyll", "Hemoglobin"], correct: "Chlorophyll" },
                    { text: "What is the hardest substance in the human body?", options: ["Bone", "Enamel", "Cartilage", "Keratin"], correct: "Enamel" }
                ]
            },
            {
                id: 4,
                title: "🧪 Chemistry Challenge",
                subject: "Chemistry",
                difficulty: "hard",
                icon: "🧪",
                timeLimit: 25,
                questions: 12,
                questions_data: [
                    { text: "What is H2O?", options: ["Oxygen", "Hydrogen", "Water", "Salt"], correct: "Water" },
                    { text: "What is the pH of pure water?", options: ["5", "6", "7", "8"], correct: "7" },
                    { text: "What is the symbol for Gold?", options: ["Go", "Gd", "Au", "Ag"], correct: "Au" }
                ]
            },
            {
                id: 5,
                title: "📖 Literature Land",
                subject: "Literature",
                difficulty: "easy",
                icon: "📖",
                timeLimit: 15,
                questions: 8,
                questions_data: [
                    { text: "Who wrote Romeo and Juliet?", options: ["Charles Dickens", "Jane Austen", "William Shakespeare", "Mark Twain"], correct: "William Shakespeare" },
                    { text: "What is the first book of the Harry Potter series?", options: ["Chamber of Secrets", "Prisoner of Azkaban", "Sorcerer's Stone", "Goblet of Fire"], correct: "Sorcerer's Stone" }
                ]
            },
            {
                id: 6,
                title: "🌍 History Heroes",
                subject: "History",
                difficulty: "medium",
                icon: "🌍",
                timeLimit: 20,
                questions: 10,
                questions_data: [
                    { text: "Who painted the Mona Lisa?", options: ["Van Gogh", "Picasso", "Da Vinci", "Rembrandt"], correct: "Da Vinci" },
                    { text: "Which year did World War II end?", options: ["1943", "1944", "1945", "1946"], correct: "1945" }
                ]
            }
        ];
        
        function loadQuizzes() {
            const grid = document.getElementById('quizzesGrid');
            grid.innerHTML = quizzes.map(quiz => `
                <div class="quiz-card" data-difficulty="${quiz.difficulty}" data-title="${quiz.title}" data-subject="${quiz.subject}">
                    <div class="quiz-icon">${quiz.icon}</div>
                    <h3 class="quiz-title">${quiz.title}</h3>
                    <span class="quiz-subject">📚 ${quiz.subject}</span>
                    <div class="quiz-stats">
                        <span>📝 ${quiz.questions} questions</span>
                        <span>⏱️ ${quiz.timeLimit} min</span>
                    </div>
                    <span class="difficulty difficulty-${quiz.difficulty}">
                        ${quiz.difficulty === 'easy' ? '🍭 Easy Peasy' : quiz.difficulty === 'medium' ? '📚 Medium' : '🔥 Challenge Mode'}
                    </span>
                    <button class="start-btn" onclick="startQuiz(${quiz.id})">✨ Start Quiz ✨</button>
                </div>
            `).join('');
        }
        
        function startQuiz(quizId) {
            currentQuiz = quizzes.find(q => q.id === quizId);
            if (!currentQuiz) return;
            
            document.getElementById('modalQuizTitle').textContent = `${currentQuiz.icon} ${currentQuiz.title}`;
            
            // Build questions HTML
            const questionsHtml = currentQuiz.questions_data.map((q, idx) => `
                <div class="quiz-question" data-qidx="${idx}">
                    <div class="question-text"><strong>Q${idx + 1}.</strong> ${q.text}</div>
                    <div class="quiz-options">
                        ${q.options.map(opt => `
                            <label class="quiz-option">
                                <input type="radio" name="q${idx}" value="${opt}">
                                <span>${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            document.getElementById('quizQuestionsContainer').innerHTML = questionsHtml;
            
            // Start timer
            timeLeft = currentQuiz.timeLimit * 60;
            startTimer();
            
            document.getElementById('quizModal').style.display = 'flex';
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitQuiz();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById('quizTimer').innerHTML = `⏱️ Time: ${minutes}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }
        
        function submitQuiz() {
            clearInterval(timerInterval);
            
            let score = 0;
            const total = currentQuiz.questions_data.length;
            
            for (let i = 0; i < total; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected && selected.value === currentQuiz.questions_data[i].correct) {
                    score++;
                }
            }
            
            const percentage = Math.round((score / total) * 100);
            
            // Show result
            document.getElementById('resultPercentage').textContent = `${percentage}%`;
            
            if (percentage >= 80) {
                document.getElementById('resultEmoji').textContent = '🏆🎉🌟';
                document.getElementById('resultMessage').innerHTML = `Amazing! You got ${score}/${total} correct! AISHA is so proud of you! 💕`;
            } else if (percentage >= 60) {
                document.getElementById('resultEmoji').textContent = '👍😊';
                document.getElementById('resultMessage').innerHTML = `Good job! ${score}/${total} correct. Keep practicing with AISHA! 📚`;
            } else {
                document.getElementById('resultEmoji').textContent = '💪🌱';
                document.getElementById('resultMessage').innerHTML = `You got ${score}/${total}. Don't worry! AISHA will help you improve. Want to review together? 🤗`;
            }
            
            closeQuizModal();
            document.getElementById('resultModal').style.display = 'flex';
        }
        
        function closeQuizModal() {
            document.getElementById('quizModal').style.display = 'none';
            if (timerInterval) clearInterval(timerInterval);
        }
        
        function closeResultModal() {
            document.getElementById('resultModal').style.display = 'none';
        }
        
        // Filter quizzes
        function filterQuizzes() {
            const searchTerm = document.getElementById('searchQuiz').value.toLowerCase();
            const difficulty = document.getElementById('difficultyFilter').value;
            const cards = document.querySelectorAll('.quiz-card');
            
            cards.forEach(card => {
                const title = card.dataset.title?.toLowerCase() || '';
                const subject = card.dataset.subject?.toLowerCase() || '';
                const cardDifficulty = card.dataset.difficulty;
                
                const matchesSearch = title.includes(searchTerm) || subject.includes(searchTerm);
                const matchesDiff = !difficulty || cardDifficulty === difficulty;
                
                card.style.display = matchesSearch && matchesDiff ? 'block' : 'none';
            });
        }
        
        function getCurrentUser() {
            const userStr = localStorage.getItem('user');
            return userStr ? JSON.parse(userStr) : null;
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
        
        // Check login
        if (!getCurrentUser()) {
            window.location.href = '/login.html';
        }
        
        // Event listeners
        document.getElementById('searchQuiz').addEventListener('input', filterQuizzes);
        document.getElementById('difficultyFilter').addEventListener('change', filterQuizzes);
        
        // Load quizzes
        loadQuizzes();
    </script>
</body>
</html>
