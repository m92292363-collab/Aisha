<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AISHA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container { width: 100%; max-width: 400px; padding: 1rem; }
        .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 20px; padding: 2rem; border: 1px solid rgba(255,215,0,0.2); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #ffd700; font-size: 1.8rem; }
        .logo p { color: #8899aa; font-size: 0.9rem; margin-top: 0.3rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #ccddee; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; background: rgba(255,255,255,0.1); color: white; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #ffd700; }
        .form-group input::placeholder { color: #8899aa; }
        .btn { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, #ffd700, #ffed4e); color: #1a1a2e; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message { background: rgba(255,71,87,0.2); color: #ff6b81; padding: 0.8rem; border-radius: 12px; margin-bottom: 1rem; display: none; text-align: center; font-size: 0.9rem; }
        .back-link { text-align: center; margin-top: 1.5rem; }
        .back-link a { color: #8899aa; text-decoration: none; font-size: 0.9rem; }
        .back-link a:hover { color: #ffd700; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo"><h1>🔒 Admin Portal</h1><p>AISHA Admin Access</p></div>
            <div id="errorMessage" class="error-message"></div>
            <form onsubmit="handleAdminLogin(event)">
                <div class="form-group"><label>Admin Email</label><input type="email" id="adminEmail" required placeholder="admin@aisha.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="adminPassword" required placeholder="••••••••"></div>
                <button type="submit" class="btn" id="loginBtn">Admin Login →</button>
            </form>
        </div>
    </div>
    <script>
        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function handleAdminLogin(event) {
            event.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            document.getElementById('errorMessage').style.display = 'none';

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success && data.user && data.user.role === 'admin') {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/admin/dashboard.html';
                } else if (data.success && data.user.role !== 'admin') {
                    showError('This account does not have admin access');
                } else {
                    showError(data.error || 'Invalid admin credentials');
                }
            } catch (err) {
                showError('Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Admin Login →';
            }
        }

        // Already logged in as admin?
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (user && user.role === 'admin') {
            window.location.href = '/admin/dashboard.html';
        }
    </script>
</body>
</html>
