<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffd700; --dark: #1a1035; --darker: #120b28; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, #0f0a20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 2.5rem; }
        .logo-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .logo h1 { color: var(--yellow); font-size: 1.6rem; font-weight: 900; }
        .logo p { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 0.3rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: rgba(255,255,255,0.7); font-weight: 700; font-size: 0.9rem; }
        .input-wrap { position: relative; }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus { border-color: var(--yellow); background: rgba(255,255,255,0.08); }
        .toggle-pw {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem;
            line-height: 1;
        }
        .toggle-pw:hover { color: var(--yellow); }
        .pw-input { padding-right: 3rem !important; }
        .btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--yellow), #ff8c00);
            color: #1a1035;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 20px rgba(255,215,0,0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,215,0,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg {
            background: rgba(255,71,87,0.15);
            border: 1px solid rgba(255,71,87,0.3);
            color: #ff6b6b;
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
            font-size: 0.88rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>Admin Portal</h1>
            <p>AISHA Management System</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="adminEmail" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" id="adminPassword" class="pw-input" required autocomplete="off">
                    <button type="button" class="toggle-pw" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn" id="loginBtn">Login →</button>
        </form>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('adminPassword');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.success && data.user && data.user.role === 'admin') {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/admin/dashboard.html';
                } else if (data.success && data.user.role !== 'admin') {
                    showError('Access denied. Admin accounts only.');
                } else {
                    showError(data.error || 'Invalid credentials');
                }
            } catch {
                showError('Connection error. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Login →';
            }
        }

        const user = JSON.parse(localStorage.getItem('user') || 'null');
        if (user && user.role === 'admin') window.location.href = '/admin/dashboard.html';
    </script>
</body>
</html>
