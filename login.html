<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA - Login to Your AI Tutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        /* Floating Background Elements */
        .floating-emoji {
            position: absolute;
            font-size: 2rem;
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        /* Main Container */
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 1rem;
            position: relative;
            z-index: 1;
        }
        
        /* Cartoon Card */
        .login-card {
            background: white;
            border-radius: 50px;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: slideUp 0.5s ease-out;
            border: 3px solid #ffd700;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* AISHA Avatar */
        .aisha-welcome {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .aisha-avatar {
            font-size: 5rem;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .aisha-welcome h1 {
            color: #ff6b9d;
            font-size: 2.5rem;
            margin-top: 0.5rem;
        }
        
        .aisha-welcome p {
            color: #999;
            font-size: 0.9rem;
        }
        
        /* Tab Buttons */
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: #f8f9fa;
            border-radius: 50px;
            padding: 0.3rem;
        }
        
        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b9d, #ff85b3);
            color: white;
            box-shadow: 0 5px 15px rgba(255,107,157,0.3);
        }
        
        /* Forms */
        .auth-form {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }
        
        .auth-form.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: bold;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-emoji {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #ffe0e8;
            border-radius: 50px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.2);
        }
        
        /* Button */
        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff6b9d, #ff85b3);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            margin-top: 1rem;
        }
        
        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(255,107,157,0.3);
        }
        
        /* Demo Credentials */
        .demo-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff5f8;
            border-radius: 20px;
            text-align: center;
        }
        
        .demo-box p {
            color: #ff6b9d;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .demo-credentials {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .demo-btn {
            padding: 0.5rem 1rem;
            background: white;
            border: 1px solid #ffd700;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .demo-btn:hover {
            background: #ffd700;
            transform: scale(1.05);
        }
        
        /* Error Message */
        .error-message {
            background: #ffe0e8;
            color: #ff4757;
            padding: 0.8rem;
            border-radius: 50px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        
        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #999;
            font-size: 0.8rem;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 1.5rem;
            }
            
            .aisha-avatar {
                font-size: 3.5rem;
            }
            
            .aisha-welcome h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Emojis for Fun -->
    <div class="floating-emoji" style="top: 10%; left: 5%; animation-delay: 0s;">📚</div>
    <div class="floating-emoji" style="top: 20%; right: 8%; animation-delay: 1s;">🤖</div>
    <div class="floating-emoji" style="bottom: 15%; left: 10%; animation-delay: 2s;">⭐</div>
    <div class="floating-emoji" style="bottom: 25%; right: 12%; animation-delay: 1.5s;">🌸</div>
    <div class="floating-emoji" style="top: 50%; left: 3%; animation-delay: 0.5s;">🎓</div>
    <div class="floating-emoji" style="top: 60%; right: 5%; animation-delay: 2.5s;">💕</div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="aisha-welcome">
                <div class="aisha-avatar">🤖💕</div>
                <h1>AISHA</h1>
                <p>Your Personal AI Tutor</p>
            </div>
            
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">🔐 Login</button>
                <button class="tab-btn" onclick="switchTab('register')">✨ Sign Up</button>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>📧 Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-emoji">✉️</span>
                        <input type="email" id="loginEmail" placeholder="student@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <div class="input-wrapper">
                        <span class="input-emoji">🔑</span>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="auth-btn">🎉 Login to AISHA 🎉</button>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>👤 Your Name</label>
                    <div class="input-wrapper">
                        <span class="input-emoji">😊</span>
                        <input type="text" id="regName" placeholder="e.g., Sarah Johnson" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>📧 Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-emoji">✉️</span>
                        <input type="email" id="regEmail" placeholder="student@example.com" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <div class="input-wrapper">
                        <span class="input-emoji">🔑</span>
                        <input type="password" id="regPassword" placeholder="Create a password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>✅ Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-emoji">✓</span>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                    </div>
                </div>
                <button type="submit" class="auth-btn">🌟 Start Learning with AISHA 🌟</button>
            </form>
            
            <!-- Demo Credentials -->
            <div class="demo-box">
                <p>🎭 Try AISHA with Demo Accounts:</p>
                <div class="demo-credentials">
                    <button class="demo-btn" onclick="fillDemo('student')">👨‍🎓 Student Demo</button>
                    <button class="demo-btn" onclick="fillDemo('admin')">👩‍💼 Admin Demo</button>
                </div>
            </div>
            
            <div class="login-footer">
                <p>💕 AISHA learns with you | Free for students 💕</p>
            </div>
        </div>
    </div>
    
    <script>
        // Demo accounts
        const demoAccounts = {
            student: { email: "student@bookmind.com", password: "Student123!", role: "student", name: "Demo Student" },
            admin: { email: "admin@bookmind.com", password: "Admin123!", role: "admin", name: "Demo Admin" }
        };
        
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }
        
        function fillDemo(type) {
            const demo = demoAccounts[type];
            if (demo) {
                document.getElementById('loginEmail').value = demo.email;
                document.getElementById('loginPassword').value = demo.password;
                showError(`✨ Demo credentials filled! Click Login to enter AISHA's world! ✨`, '#52b788');
            }
        }
        
        function showError(message, bgColor = '#ffe0e8') {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            errorDiv.style.background = bgColor;
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Demo login check
            if (email === demoAccounts.student.email && password === demoAccounts.student.password) {
                const user = {
                    id: 'demo-student-1',
                    email: email,
                    full_name: 'Demo Student',
                    role: 'student'
                };
                localStorage.setItem('token', 'demo-token-student');
                localStorage.setItem('user', JSON.stringify(user));
                showError('🎉 Welcome back, Student! Redirecting to AISHA... 🎉', '#c8e6e0');
                setTimeout(() => {
                    window.location.href = '/student/dashboard.html';
                }, 1000);
                return;
            }
            
            if (email === demoAccounts.admin.email && password === demoAccounts.admin.password) {
                const user = {
                    id: 'demo-admin-1',
                    email: email,
                    full_name: 'Demo Admin',
                    role: 'admin'
                };
                localStorage.setItem('token', 'demo-token-admin');
                localStorage.setItem('user', JSON.stringify(user));
                showError('👋 Welcome Admin! Redirecting to Admin Portal... 👋', '#c8e6e0');
                setTimeout(() => {
                    window.location.href = '/admin/dashboard.html';
                }, 1000);
                return;
            }
            
            // Check for registered users in localStorage
            const users = JSON.parse(localStorage.getItem('aisha_users') || '[]');
            const foundUser = users.find(u => u.email === email && u.password === password);
            
            if (foundUser) {
                const user = {
                    id: foundUser.id,
                    email: foundUser.email,
                    full_name: foundUser.full_name,
                    role: foundUser.role || 'student'
                };
                localStorage.setItem('token', 'user-token-' + Date.now());
                localStorage.setItem('user', JSON.stringify(user));
                showError(`🌸 Welcome back, ${foundUser.full_name}! AISHA missed you! 🌸`, '#c8e6e0');
                setTimeout(() => {
                    window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/student/dashboard.html';
                }, 1000);
            } else {
                showError('❌ Hmm... I don\'t recognize these credentials. Try the demo or sign up! ❌');
            }
        }
        
        function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (password !== confirm) {
                showError('❌ Passwords don\'t match! Can you type them again? ❌');
                return;
            }
            
            if (password.length < 6) {
                showError('🔒 Password should be at least 6 characters long! 🔒');
                return;
            }
            
            // Check if user already exists
            const users = JSON.parse(localStorage.getItem('aisha_users') || '[]');
            if (users.find(u => u.email === email)) {
                showError('📧 This email is already registered! Try logging in instead. 📧');
                return;
            }
            
            // Create new user
            const newUser = {
                id: 'user_' + Date.now(),
                email: email,
                password: password,
                full_name: name,
                role: 'student',
                created_at: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('aisha_users', JSON.stringify(users));
            
            // Auto login
            const user = {
                id: newUser.id,
                email: newUser.email,
                full_name: newUser.full_name,
                role: 'student'
            };
            localStorage.setItem('token', 'user-token-' + Date.now());
            localStorage.setItem('user', JSON.stringify(user));
            
            showError(`🎉 Yay! Welcome to AISHA's family, ${name}! Redirecting you now... 🎉`, '#c8e6e0');
            setTimeout(() => {
                window.location.href = '/student/dashboard.html';
            }, 1000);
        }
        
        // Check if already logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (token && user.role === 'student') {
            window.location.href = '/student/dashboard.html';
        } else if (token && user.role === 'admin') {
            window.location.href = '/admin/dashboard.html';
        }
    </script>
</body>
</html>
