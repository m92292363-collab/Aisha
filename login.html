<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container { width: 100%; max-width: 420px; padding: 1rem; }
        .login-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #667eea; font-size: 2rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #e0e0e0; }
        .tab { flex: 1; padding: 0.8rem; background: none; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; color: #666; }
        .tab.active { color: #667eea; border-bottom: 2px solid #667eea; }
        .form { display: none; }
        .form.active { display: block; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 1rem; }
        .btn { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); }
        .error-message { background: #fee2e2; color: #dc2626; padding: 0.8rem; border-radius: 12px; margin-bottom: 1rem; display: none; text-align: center; }
        .success-message { background: #d1fae5; color: #065f46; padding: 0.8rem; border-radius: 12px; margin-bottom: 1rem; display: none; text-align: center; }
        .demo-box { background: #f0f0f0; border-radius: 12px; padding: 1rem; margin-top: 1.5rem; text-align: center; }
        .demo-box p { color: #666; font-size: 0.8rem; margin-bottom: 0.5rem; }
        .demo-credentials { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }
        .demo-btn { background: white; border: 1px solid #667eea; padding: 0.4rem 0.8rem; border-radius: 20px; font-size: 0.7rem; cursor: pointer; }
        .demo-btn:hover { background: #667eea; color: white; }
        .footer { text-align: center; margin-top: 1rem; color: #999; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo"><h1>📚 AISHA</h1></div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Sign Up</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div>
                <button type="submit" class="btn">Login →</button>
            </form>
            
            <form id="registerForm" class="form" onsubmit="handleRegister(event)">
                <div class="form-group"><label>Full Name</label><input type="text" id="regName" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="regPassword" required></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="regConfirm" required></div>
                <button type="submit" class="btn">Create Account →</button>
            </form>
            
            <div class="demo-box">
                <p>✨ Demo Accounts - Click to auto-fill ✨</p>
                <div class="demo-credentials">
                    <button class="demo-btn" onclick="fillDemo('admin')">👑 Admin: admin@aisha.com / admin123</button>
                    <button class="demo-btn" onclick="fillDemo('student')">🎓 Student: student@aisha.com / student123</button>
                </div>
            </div>
            <div class="footer"><p>Learn smarter with AI</p></div>
        </div>
    </div>
    
    <script>
        // THIS WORKS - LOCAL STORAGE ONLY, NO NETLIFY FUNCTIONS NEEDED
        
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }
        
        function fillDemo(type) {
            if (type === 'admin') {
                document.getElementById('loginEmail').value = 'admin@aisha.com';
                document.getElementById('loginPassword').value = 'admin123';
            } else {
                document.getElementById('loginEmail').value = 'student@aisha.com';
                document.getElementById('loginPassword').value = 'student123';
            }
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
        
        function getUsers() {
            const users = localStorage.getItem('aisha_users');
            if (users) return JSON.parse(users);
            
            const defaultUsers = [
                { id: 'admin_1', full_name: 'System Admin', email: 'admin@aisha.com', password: 'admin123', role: 'admin' },
                { id: 'student_1', full_name: 'Demo Student', email: 'student@aisha.com', password: 'student123', role: 'student' }
            ];
            localStorage.setItem('aisha_users', JSON.stringify(defaultUsers));
            return defaultUsers;
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const users = getUsers();
            const user = users.find(u => u.email === email && u.password === password);
            
            if (user) {
                localStorage.setItem('aisha_current_user', JSON.stringify(user));
                document.getElementById('successMessage').textContent = 'Login successful! Redirecting...';
                document.getElementById('successMessage').style.display = 'block';
                setTimeout(() => {
                    window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/student/dashboard.html';
                }, 1000);
            } else {
                document.getElementById('errorMessage').textContent = 'Invalid email or password';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }
        
        function handleRegister(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (password !== confirm) {
                document.getElementById('errorMessage').textContent = 'Passwords do not match';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            const users = getUsers();
            if (users.find(u => u.email === email)) {
                document.getElementById('errorMessage').textContent = 'Email already registered';
                document.getElementById('errorMessage').style.display = 'block';
                return;
            }
            
            const newUser = {
                id: 'user_' + Date.now(),
                full_name: name,
                email: email,
                password: password,
                role: 'student'
            };
            users.push(newUser);
            localStorage.setItem('aisha_users', JSON.stringify(users));
            localStorage.setItem('aisha_current_user', JSON.stringify(newUser));
            
            document.getElementById('successMessage').textContent = 'Account created! Redirecting...';
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => window.location.href = '/student/dashboard.html', 1000);
        }
        
        const saved = localStorage.getItem('aisha_current_user');
        if (saved) {
            const user = JSON.parse(saved);
            if (user.id) {
                window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/student/dashboard.html';
            }
        }
    </script>
</body>
</html>
