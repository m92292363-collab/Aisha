<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISHA - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container { width: 100%; max-width: 420px; padding: 1rem; }
        .login-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo h1 { color: #667eea; font-size: 2rem; }
        .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #e0e0e0; }
        .tab { flex: 1; padding: 0.8rem; background: none; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; color: #666; }
        .tab.active { color: #667eea; border-bottom: 2px solid #667eea; }
        .form { display: none; }
        .form.active { display: block; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 0.9rem; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); }
        .error-message { background: #fee2e2; color: #dc2626; padding: 0.8rem; border-radius: 12px; margin-bottom: 1rem; display: none; text-align: center; }
        .footer { text-align: center; margin-top: 1.5rem; color: #999; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo"><h1>📚 AISHA</h1></div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Sign Up</button>
            </div>
            <div id="errorMessage" class="error-message"></div>
            
            <form id="loginForm" class="form active" onsubmit="handleLogin(event)">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div>
                <button type="submit" class="btn">Login →</button>
            </form>
            
            <form id="registerForm" class="form" onsubmit="handleRegister(event)">
                <div class="form-group"><label>Full Name</label><input type="text" id="regName" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="regPassword" required></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="regConfirm" required></div>
                <button type="submit" class="btn">Create Account →</button>
            </form>
            <div class="footer"><p>Learn smarter with AI</p></div>
        </div>
    </div>
    
    <script>
        const API_URL = '/.netlify/functions/api/real-auth';
        
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab');
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
            hideError();
        }
        
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => hideError(), 3000);
        }
        
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = data.user.role === 'admin' ? '/admin/dashboard.html' : '/student/dashboard.html';
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
            }
        }
        
        async function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            
            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: name })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/student/dashboard.html';
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
            }
        }
        
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.id) {
            window.location.href = user.role === 'admin' ? '/admin/dashboard.html' : '/student/dashboard.html';
        }
    </script>
</body>
</html>
